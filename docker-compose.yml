version: '3.8'

services:
  # frontend (Next.js)
  pos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Example ENV for connecting to API
      # - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - pos-backend
    networks:
      - pos-network

  # backend (NestJS)
  pos-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://posuser:pospassword@pos-db:5432/posdb?schema=posdb
    depends_on:
      - pos-db
    networks:
      - pos-network

  # database (PostgreSQL)
  pos-db:
    image: postgres:15-alpine
    container_name: pos-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=posuser
      - POSTGRES_PASSWORD=pospassword
      - POSTGRES_DB=posdb
    ports:
      - "5433:5432"
    volumes:
      - pos-db-data:/var/lib/postgresql/data
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  pos-db-data:
